name: Build Mac App

on:
  push:
    branches: [ dev ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run dist

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/